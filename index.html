<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Casino Simulator</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
    <h1>🎰 Casino Simulator</h1>
    <p>Virtuális zsetonos kaszinó játék</p>
</header>


<div class="wallet">
    💰 Zseton:
    <span id="coins">1000</span>
</div>

<div id="profile" class="game">

</div>


<nav class="lobby">

    <div class="game-card" onclick="openGame('slot')">
        <div class="icon">🎰</div>
        <h3>Slot Machine</h3>
        <p>Forgasd meg a gépet!</p>
    </div>


    <div class="game-card" onclick="openGame('blackjack')">
        <div class="icon">♠</div>
        <h3>Blackjack</h3>
        <p>Érd el a 21-et!</p>
    </div>


<section id="roulette" class="game hidden">

<h2>🎡 Rulett</h2>

<div id="wheel">
    <div id="wheel-center">
        🎡
    </div>
</div>

<p id="roulette-result">
Válassz színt!
</p>


<button onclick="playRoulette('piros')">
🔴 Piros
</button>

<button onclick="playRoulette('fekete')">
⚫ Fekete
</button>

</section>

</nav>


<main>

<section id="slot" class="game">

<h2>🎰 Nyerőgép</h2>

<div id="slot-display">
🍒 🍋 ⭐
</div>

<button onclick="playSlot()">
Pörgetés (50 zseton)
</button>

<p id="slot-message"></p>

</section>



<section id="blackjack" class="game hidden">

<h2>♠ Blackjack</h2>

<p id="blackjack-result">
Nyomj játékot!
</p>

<button onclick="playBlackjack()">
Játék (100 zseton)
</button>

</section>



<section id="roulette" class="game hidden">

<h2>🎡 Rulett</h2>

<p id="roulette-result">
Válassz színt!
</p>


<button onclick="playRoulette('piros')">
🔴 Piros
</button>


<button onclick="playRoulette('fekete')">
⚫ Fekete
</button>


</section>


</main>

<audio id="clickSound" src="assets/sounds/click.mp3"></audio>
<audio id="winSound" src="assets/sounds/win.mp3"></audio>
<audio id="loseSound" src="assets/sounds/lose.mp3"></audio>
<audio id="spinSound" src="assets/sounds/spin.mp3"></audio>
<script src="js/wallet.js"></script>
<script src="js/app.js"></script>
<script src="js/slot.js"></script>
<script src="js/blackjack.js"></script>
<script src="js/roulette.js"></script>
<script src="js/sounds.js"></script>
<script src="js/statistics.js"></script>


</body>
</html>
